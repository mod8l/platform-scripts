name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e cli/repo_health[dev]

      - name: Lint shell scripts
        run: |
          find . -type f -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -r shellcheck

      - name: Lint Python
        run: |
          ruff check .
          ruff format --check .

      - name: Test CLI
        run: pytest cli/
